# Require packages to be at least 7 days old before installing.
# Protects against supply chain attacks via recently-published malicious versions.
# Temporarily set to absolute date (restore to "7 days" after 2026-05-14):
# Exception: urllib3 2.7.0 (2026-05-07) fixes CVE-2026-44431 and CVE-2026-44432.
# idna 3.15 (2026-05-12) fixes CVE-2026-45409 and is within this cutoff.
exclude-newer = "2026-05-12T23:59:59Z"

# Per-package exception: starlette 1.0.1 (2026-05-21) fixes PYSEC-2026-161;
# its release is newer than the global cutoff above.
[exclude-newer-package]
starlette = "2026-05-21T23:59:59Z"
