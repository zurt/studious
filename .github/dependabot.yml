version: 2

updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      backend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      frontend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
