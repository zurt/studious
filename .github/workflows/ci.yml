name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install (frozen)
        run: uv sync --frozen --extra dev
      - name: Test
        run: uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=75

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install (frozen)
        run: npm ci
      - name: Test
        run: npm test

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: npm audit (high+critical)
        working-directory: frontend
        run: |
          npm ci --ignore-scripts
          npm audit --omit=dev --audit-level=high

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: pip-audit
        working-directory: backend
        run: |
          uv sync --frozen --extra dev
          uv run pip-audit
