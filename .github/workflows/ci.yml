name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Install (frozen)
        run: uv sync --frozen --extra dev
      - name: Test
        run: uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=75

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install (frozen)
        run: npm ci
      - name: Test
        run: npm test

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: npm audit (high+critical)
        working-directory: frontend
        run: |
          npm ci --ignore-scripts
          npm audit --omit=dev --audit-level=high

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: pip-audit
        working-directory: backend
        run: |
          uv sync --frozen --extra dev
          # Temporarily ignoring two starlette advisories whose only fixes
          # (1.3.0 / 1.3.1) are still inside our 7-day install cooldown
          # (uv.toml exclude-newer). starlette is pinned to 1.2.1, the newest
          # eligible release. Remove both ignores and bump starlette once the
          # fixes age past the cooldown (~2026-06-19).
          uv run pip-audit \
            --ignore-vuln CVE-2026-54283 \
            --ignore-vuln CVE-2026-54282
